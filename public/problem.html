<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>题目详情 - OJ System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="bg-grid"></div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/problem_list.html" class="navbar-brand">
        <svg viewBox="0 0 40 40" fill="none">
          <rect x="2" y="2" width="36" height="36" rx="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <path d="M12 26L12 14L18 20L24 14L28 20L28 26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="10" y1="30" x2="30" y2="30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="navbar-brand-text">OJ System</span>
      </a>

      <div class="navbar-user">
        <a href="/problem_list.html" class="navbar-username" style="text-decoration:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          返回题目列表
        </a>
        <span class="navbar-username">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
          </svg>
          <span id="nav-username"></span>
        </span>
        <span id="nav-role" class="navbar-role-badge" style="display:none;">ADMIN</span>
        <a href="/admin.html" class="nav-admin-link" id="nav-admin-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          管理
        </a>
        <button class="btn-logout" id="btn-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>登出</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="problem-detail" id="app">

    <aside class="problem-panel" id="problem-panel">
      <div class="state-message visible" id="problem-loading">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spinner-icon">
          <circle cx="12" cy="12" r="9"/>
          <path d="M10 6c-2.1.8-3.8 2.2-4.7 4.1"/>
          <style>
            .spinner-icon { animation: spin 1.5s linear infinite; }
            @keyframes spin { to { transform: rotate(360deg); } }
          </style>
        </svg>
        <p class="state-title">加载题目中...</p>
      </div>

      <div class="state-message" id="problem-error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <p class="state-title">加载失败</p>
        <p id="problem-error-text"></p>
      </div>

      <div id="problem-content" style="display:none;">
        <div class="problem-panel-header">
          <h1 class="problem-panel-title" id="problem-title"></h1>
          <div class="problem-panel-meta">
            <span class="problem-panel-id" id="problem-id-label"></span>
            <span id="problem-difficulty"></span>
          </div>
        </div>
        <div class="problem-content" id="problem-body"></div>
        <div class="solution-section" id="solution-section" style="display:none;">
          <div class="solution-header" id="solution-toggle">
            <div class="solution-title">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="8 12 11 15 16 9"/>
              </svg>
              题解
            </div>
            <svg class="solution-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
          <div class="solution-body" id="solution-body">
            <div class="problem-content" id="solution-explanation"></div>
            <div class="solution-code-section" id="solution-code-section" style="display:none;">
              <div class="solution-code-label">参考代码</div>
              <pre class="solution-code-pre"><code id="solution-code-display"></code></pre>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <section class="editor-panel">
      <div class="editor-toolbar">
        <div class="editor-toolbar-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
          solution.cpp
          <span class="editor-lang-badge">C++</span>
        </div>
        <button class="btn-submit" id="btn-submit">
          <span class="btn-spinner"></span>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <span class="btn-text">提交运行</span>
        </button>
      </div>
      <div class="editor-container">
        <div id="editor"></div>
      </div>

      <div class="results-panel" id="results-panel">
        <div class="results-header">
          <div class="results-status">
            <span class="results-status-badge" id="result-badge"></span>
            <span class="results-progress" id="result-progress"></span>
          </div>
          <button class="btn-submit" id="btn-resubmit" style="font-size:0.8rem; padding:7px 18px;">
            <span class="btn-spinner"></span>
            <span class="btn-text">重新提交</span>
          </button>
        </div>
        <div id="results-body"></div>
      </div>
    </section>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.9/ace.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/problem_detail.js"></script>
</body>
</html>
