<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - OJ System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="bg-grid"></div>

  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/problem_list.html" class="navbar-brand">
        <svg viewBox="0 0 40 40" fill="none">
          <rect x="2" y="2" width="36" height="36" rx="8" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <path d="M12 26L12 14L18 20L24 14L28 20L28 26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="10" y1="30" x2="30" y2="30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="navbar-brand-text">OJ System</span>
      </a>

      <div class="navbar-user">
        <a href="/problem_list.html" class="navbar-username" style="text-decoration:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          返回题目列表
        </a>
        <span class="navbar-username">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
          </svg>
          <span id="nav-username"></span>
        </span>
        <span id="nav-role" class="navbar-role-badge" style="display:none;">ADMIN</span>
        <a href="/admin.html" class="nav-admin-link" id="nav-admin-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          管理
        </a>
        <button class="btn-logout" id="btn-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>登出</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="page">
    <div class="admin-page">
      <div class="admin-page-inner">

        <div id="admin-denied" class="admin-denied" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <h2>无访问权限</h2>
          <p>此页面仅限管理员访问，请使用管理员账号登录。</p>
        </div>

        <div id="admin-content" style="display:none;">
          <h1 class="admin-page-title">Admin Panel</h1>
          <p class="admin-page-subtitle">&gt; admin --manage problems</p>

          <!-- Create Problem Section -->
          <div class="admin-section" id="create-section">
            <div class="admin-section-header" id="create-section-toggle">
              <div class="admin-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span id="create-section-label">创建新题目</span>
              </div>
              <svg class="admin-section-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
            <div class="admin-section-body">
              <form class="admin-form" id="create-form" novalidate>
                <div class="form-group">
                  <label class="form-label" for="problem-title">题目标题 *</label>
                  <input type="text" id="problem-title" class="form-input" placeholder="例：A + B 问题" maxlength="255" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="problem-difficulty">难度</label>
                  <select id="problem-difficulty" class="form-select">
                    <option value="Easy">Easy</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="Hard">Hard</option>
                  </select>
                </div>
                <div class="form-group full-width">
                  <label class="form-label" for="problem-content">题目描述（Markdown）*</label>
                  <textarea id="problem-content" class="form-textarea" placeholder="## 题目描述&#10;&#10;这里写题目内容..." rows="6" required></textarea>
                </div>
                <div class="form-group full-width">
                  <label class="form-label" for="problem-template">代码模板</label>
                  <textarea id="problem-template" class="form-textarea" rows="4" placeholder="#include &lt;iostream&gt;&#10;&#10;int main() {&#10;&#10;  return 0;&#10;}"></textarea>
                </div>
                <div class="form-group full-width">
                  <label class="form-label" for="problem-solution-content">题解说明（Markdown）</label>
                  <textarea id="problem-solution-content" class="form-textarea" rows="4" placeholder="## 解题思路&#10;&#10;这里写题解内容..."></textarea>
                </div>
                <div class="form-group full-width">
                  <label class="form-label" for="problem-solution-code">题解代码</label>
                  <textarea id="problem-solution-code" class="form-textarea" rows="4" placeholder="#include &lt;iostream&gt;&#10;&#10;int main() {&#10;  // 参考代码&#10;  return 0;&#10;}"></textarea>
                </div>

                <div class="test-cases-section">
                  <div class="test-cases-header">
                    <div class="test-cases-label">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="20" height="20" rx="3"/>
                        <line x1="8" y1="8" x2="16" y2="8"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                        <line x1="8" y1="16" x2="12" y2="16"/>
                      </svg>
                      测试用例
                      <span class="test-cases-count" id="testcase-count">0 个</span>
                    </div>
                    <button type="button" class="btn-add-testcase" id="btn-add-testcase">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                      </svg>
                      添加
                    </button>
                  </div>
                  <div id="testcase-container"></div>
                </div>

                <div class="admin-form-actions">
                  <button type="submit" class="btn-create" id="btn-create">
                    <span class="btn-spinner"></span>
                    <span id="btn-create-text">创建题目</span>
                  </button>
                  <button type="button" class="btn-cancel" id="btn-cancel-edit" style="display:none;">取消编辑</button>
                  <div class="admin-form-feedback" id="form-feedback"></div>
                </div>
              </form>
            </div>
          </div>

          <!-- Problem List Section -->
          <div class="admin-section" id="list-section">
            <div class="admin-section-header" id="list-section-toggle">
              <div class="admin-section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="20" rx="3"/>
                  <line x1="8" y1="8" x2="16" y2="8"/>
                  <line x1="8" y1="12" x2="16" y2="12"/>
                  <line x1="8" y1="16" x2="12" y2="16"/>
                </svg>
                题目列表
              </div>
              <svg class="admin-section-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
            <div class="admin-section-body">
              <div class="state-message visible" id="admin-loading">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spinner-icon">
                  <circle cx="12" cy="12" r="9"/>
                  <path d="M10 6c-2.1.8-3.8 2.2-4.7 4.1"/>
                  <style>.spinner-icon{animation:spin 1.5s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style>
                </svg>
                <p class="state-title">加载题目列表...</p>
              </div>
              <div class="state-message" id="admin-error">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="15" y1="9" x2="9" y2="15"/>
                  <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <p class="state-title">加载失败</p>
                <p id="admin-error-text"></p>
                <button class="btn btn-primary" id="btn-admin-retry" style="width:auto;margin-top:12px;padding:8px 28px;">重试</button>
              </div>
              <div class="state-message" id="admin-empty">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="2" width="20" height="20" rx="3"/>
                  <line x1="8" y1="8" x2="16" y2="8"/>
                  <line x1="8" y1="12" x2="16" y2="12"/>
                  <line x1="8" y1="16" x2="12" y2="16"/>
                </svg>
                <p class="state-title">暂无题目</p>
                <p>使用上方的表单创建第一个题目</p>
              </div>
              <div class="admin-table-wrapper" id="admin-table-wrapper" style="display:none;">
                <table class="admin-problem-table">
                  <thead>
                    <tr>
                      <th class="admin-col-id">#</th>
                      <th>标题</th>
                      <th class="admin-col-difficulty">难度</th>
                      <th class="admin-col-actions">操作</th>
                    </tr>
                  </thead>
                  <tbody id="admin-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <p class="auth-tagline">
    Powered by <span>C++</span> &amp; cpp-httplib
  </p>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
